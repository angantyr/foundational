# Database configuration with YAML anchors for clean, maintainable structure

default: &default
  adapter: sqlite3
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

sqlite: &sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/foundational_development
  managed:
    <<: *sqlite
    database: storage/development_managed.sqlite3
    migrations_paths: db/managed_migrate
  search:
    <<: *sqlite
    database: storage/development_search.sqlite3
    migrations_paths: db/search_migrate
    schema_dump: false

test:
  primary:
    <<: *default
    database: storage/foundational_test
  managed:
    <<: *sqlite
    database: storage/test_managed.sqlite3
    migrations_paths: db/managed_migrate
  search:
    <<: *sqlite
    database: storage/test_search.sqlite3
    migrations_paths: db/search_migrate
    schema_dump: false

production:
  primary:
    <<: *default
    database: foundational_production
    username: foundational
    password: <%= ENV["FOUNDATIONAL_DATABASE_PASSWORD"] %>
cache:
  <<: *default
  database: foundational_production_cache
  username: foundational
  password: <%= ENV["FOUNDATIONAL_DATABASE_PASSWORD"] %>
  migrations_paths: db/cache_migrate
queue:
  <<: *default
  database: foundational_production_queue
  username: foundational
  password: <%= ENV["FOUNDATIONAL_DATABASE_PASSWORD"] %>
  migrations_paths: db/queue_migrate
cable:
  <<: *default
  database: foundational_production_cable
  username: foundational
  password: <%= ENV["FOUNDATIONAL_DATABASE_PASSWORD"] %>
  migrations_paths: db/cable_migrate
